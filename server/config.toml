[market]
# Phoenix SOL/USDC market on devnet
market_address = "4DoNfFBfF7UokCC2FQzriy7yHK6DY6NVdYpuekQ5pRgg"
rpc_url = "https://api.devnet.solana.com"
pair = "SOL/USDC"

[strategy]
base_spread_bps = 15.0     # Minimum half-spread in basis points
gamma = 0.1                # Risk aversion (higher = wider spreads, stronger skew)
num_levels = 3             # Quote levels per side
level_spacing_bps = 10.0   # Spacing between levels
base_size = 0.1            # Inner level size in SOL
size_decay = 0.5           # Size multiplier per level (geometric decay)

[risk]
max_position = 5.0         # Maximum absolute position in SOL
max_drawdown_usd = 50.0    # Emergency cancel threshold

[oracle]
poll_interval_ms = 2000    # Oracle poll frequency
vol_window = 30            # Rolling window for volatility (number of samples)

[engine]
cycle_interval_ms = 2000   # Main loop interval
