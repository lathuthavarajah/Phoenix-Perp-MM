name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  server:
    name: Server — Clippy + Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server
      - name: Clippy
        run: cargo clippy -- -D warnings
      - name: Test
        run: cargo test

  onchain:
    name: On-chain Program — Check + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check program
        run: cargo check -p phoenix-mm-onchain
      - name: Test fixed-point math
        run: cargo test -p phoenix-mm-onchain
      - name: Check cranker
        run: cargo check -p phoenix-mm-cranker
